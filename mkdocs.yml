site_name: Quantinue-Wiki
site_description: 팀 여름이었다 · SSOT — 확정 기준은 이 위키

docs_dir: wiki          # 심볼릭 링크로 STATUS/질문/facts를 실시간 반영

theme:
  name: material
  language: ko
  font:
    text: Noto Sans KR      # 본문 — 한글 가독성 좋은 무료 구글 폰트
    code: JetBrains Mono    # 코드 블록
  palette:
    - scheme: default
      primary: green
      accent: green
      toggle: { icon: material/brightness-7, name: 다크 모드 }
    - scheme: slate
      primary: green
      accent: green
      toggle: { icon: material/brightness-4, name: 라이트 모드 }
  features:
    - navigation.sections
    - search.highlight
    - content.tables.wrap

extra_css:
  - assets/extra.css

nav:
  - 📊 현황판: index.md
  - ❓ 회의 안건: 질문.md
  - 🎯 MVP 1차 정의: facts/MVP1차.md
  - Facts (확정 사실):
      - 파이프라인: facts/파이프라인.md
      - 데이터 계약: facts/데이터계약.md
      - 일정: facts/일정.md
      - 화면: facts/화면.md
      - 결정 로그: facts/결정로그.md
  - 🎯 산출물 현황: 산출물.md
  - 📘 사용 가이드: 가이드.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
