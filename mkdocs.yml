site_name: Quantinue-Wiki
site_description: 팀 여름이었다 · SSOT — 확정 기준은 이 위키

docs_dir: wiki          # 심볼릭 링크로 STATUS/질문/facts를 실시간 반영

theme:
  name: material
  language: ko
  font:
    text: Noto Sans KR      # 본문 — 한글 가독성 좋은 무료 구글 폰트
    code: JetBrains Mono    # 코드 블록
  palette:
    - scheme: default
      primary: green
      accent: green
      toggle: { icon: material/brightness-7, name: 다크 모드 }
    - scheme: slate
      primary: green
      accent: green
      toggle: { icon: material/brightness-4, name: 라이트 모드 }
  features:
    - navigation.sections
    - navigation.indexes    # 섹션 제목 클릭 시 개요(index) 페이지 표시
    - search.highlight
    - content.tables.wrap

extra_css:
  - assets/extra.css

nav:
  - 🏠 홈: index.md
  - 프로젝트:
      - 🔄 파이프라인: facts/파이프라인.md
      - 🔌 데이터 계약: facts/데이터계약.md
      - 🎯 MVP 1차 정의: facts/MVP1차.md
      - 📅 일정: facts/일정.md
      - 🖥️ 화면: facts/화면.md
  - 핵심 기능:
      - 에이전트/index.md
      - ⚙️ Core · Infra: 에이전트/core.md
      - 📰 Info Agent: 에이전트/info.md
      - 🧠 Strategist Agent: 에이전트/strategist.md
      - ⚖️ Critic Agent: 에이전트/critic.md
      - 📓 Reviewer Agent: 에이전트/reviewer.md
  - 협업:
      - ❓ 회의 안건: 질문.md
      - 🗣️ 회의록:
          - 목록: 회의록/index.md
          - 5차 (07-08): 회의록/2026-07-08.md
          - 4차-2 (07-06): 회의록/2026-07-06-2.md
          - 4차 (07-06): 회의록/2026-07-06.md
          - 3차 (07-03): 회의록/2026-07-03.md
          - 1차 (06-30): 회의록/2026-06-30.md
      - ✅ 결정 로그: facts/결정로그.md
      - 📜 업데이트 로그: 업데이트로그.md
      - 📦 산출물 현황: 산출물.md
  - 운영:
      - 📊 현황판: 현황판.md
      - 📘 사용 가이드: 가이드.md
      - 🛠️ 시스템 설명서: 시스템설명서.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
